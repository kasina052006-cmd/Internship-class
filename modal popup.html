<!DOCTYPE html>
<html>
<head>
  <style>
    /* Overlay background */
    #modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    /* Modal content box */
    .modal-content {
      background: white;
      padding: 20px;
      margin: 15% auto;
      width: 300px;
      text-align: center;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<button onclick="openModal()">Open Modal</button>

<div id="modal">
  <div class="modal-content">
    <p>This is a simple modal popup!</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById("modal").style.display = "block";
  }

  function closeModal() {
    document.getElementById("modal").style.display = "none";
  }
</script>

</body>
</html>
